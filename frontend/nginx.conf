server {
    listen 3000;
    root /usr/share/nginx/html;

    # index.html must never be cached so clients always reference the
    # current bundle hashes after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # Hashed build assets: cache forever and never fall back to index.html.
    # Returning 404 (instead of HTML) on a missing file avoids the confusing
    # "MIME type ('text/html') is not executable" error after a stale deploy.
    # ^~ gives this priority over the regex media location below.
    location ^~ /static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Other hashed/static media assets.
    location ~* \.(glb|webp|png|jpg|jpeg|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    location /models/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA routing: serve index.html only for navigation requests.
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
